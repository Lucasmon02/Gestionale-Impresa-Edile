<!DOCTYPE html>
<html>
<head>
  <title>Gestionale Edile PRO</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0;}
    header {background:#1e3a8a;color:white;padding:15px;text-align:center;}
    .container {padding:20px;}
    .card {background:white;padding:20px;border-radius:10px;max-width:500px;margin:auto;margin-top:20px;}
    input,select {width:100%;padding:10px;margin-top:10px;}
    button {padding:10px;margin-top:10px;width:100%;background:#1e3a8a;color:white;border:none;}
    .hidden{display:none;}
  </style>
</head>

<body>

<header>Gestionale Edile PRO</header>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Login</h2>

  <input id="user" placeholder="Username">

  <input id="pass" placeholder="Codice (solo admin)">

  <button onclick="login()">Entra</button>
</div>

<!-- MENU -->
<div id="menu" class="hidden">

<div class="card">
  <button onclick="mostra('operai')">Operai</button>
  <button onclick="mostra('cantieri')">Cantieri</button>
  <button onclick="mostra('presenze')">Presenze</button>
  <button onclick="mostra('report')">Report</button>
</div>

</div>

<!-- OPERAI -->
<div id="operai" class="card hidden">
  <h2>Operai</h2>

  <input id="nome" placeholder="Nome">
  <input id="cognome" placeholder="Cognome">
  <input id="telefono" placeholder="Telefono">
  <input id="certificato" placeholder="Certificato medico">
  <input id="note" placeholder="Note">

  <button onclick="salvaOperaio()">Salva Operaio</button>
</div>

<!-- CANTIERI -->
<div id="cantieri" class="card hidden">
  <h2>Cantieri</h2>
  <input id="cantiereNome" placeholder="Nome cantiere">
  <button onclick="salvaCantiere()">Salva</button>
</div>

<!-- PRESENZE -->
<div id="presenze" class="card hidden">
  <h2>Presenze</h2>

  <input type="date" id="data">
  <input id="operaioPres" placeholder="Nome operaio">
  <input id="cantierePres" placeholder="Cantiere">

  <select id="stato">
    <option>presente</option>
    <option>malato</option>
    <option>ferie</option>
  </select>

  <input id="ore" placeholder="Ore">
  <input id="lavoro" placeholder="Lavoro svolto">

  <button onclick="salvaPresenza()">Salva</button>
</div>

<!-- REPORT -->
<div id="report" class="card hidden">
  <h2>Report</h2>
  <input id="cerca" placeholder="Nome operaio">
  <button onclick="cerca()">Cerca</button>
  <div id="risultato"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG TUO
const firebaseConfig = {
  apiKey: "AIzaSyD_mnAjZPxEHmpIe1OVJTY-NkNDWiKxfA4",
  authDomain: "gestionale-edile-4ec0b.firebaseapp.com",
  projectId: "gestionale-edile-4ec0b",
  storageBucket: "gestionale-edile-4ec0b.firebasestorage.app",
  messagingSenderId: "397107137479",
  appId: "1:397107137479:web:10ea93af7e5185967167e2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
let ruolo = "";

window.login = function(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="admin" && p=="1234"){
    ruolo="admin";
  } else {
    ruolo="utente";
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

// NAV
window.mostra = function(id){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  if(ruolo=="utente" && id!="report"){
    alert("Accesso negato");
    document.getElementById("report").classList.remove("hidden");
  }
}

// SALVA OPERAIO
window.salvaOperaio = async function(){
  await addDoc(collection(db,"operai"),{
    nome: nome.value,
    cognome: cognome.value,
    telefono: telefono.value,
    certificato: certificato.value,
    note: note.value
  });
  alert("Salvato!");
}

// SALVA CANTIERE
window.salvaCantiere = async function(){
  await addDoc(collection(db,"cantieri"),{
    nome: cantiereNome.value
  });
  alert("Salvato!");
}

// SALVA PRESENZA
window.salvaPresenza = async function(){
  await addDoc(collection(db,"presenze"),{
    data:data.value,
    operaio:operaioPres.value,
    cantiere:cantierePres.value,
    stato:stato.value,
    ore:ore.value,
    lavoro:lavoro.value
  });
  alert("Salvato!");
}

// CERCA
window.cerca = async function(){
  let snap = await getDocs(collection(db,"presenze"));
  let html="";
  let totale=0;

  snap.forEach(doc=>{
    let d=doc.data();
    if(d.operaio==cerca.value){
      totale+=Number(d.ore||0);
      html+=`<p>${d.data} - ${d.cantiere} - ${d.ore} ore</p>`;
    }
  });

  html+=`<h3>Totale ore: ${totale}</h3>`;
  risultato.innerHTML=html;
}

</script>

</body>
</html>
